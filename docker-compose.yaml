services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: nhs-patient-assistant
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nhs-patient-assistant
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATA_PATH=data/nhs-symptom-chunks.json     
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana      
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - postgres

volumes:
  postgres_data:
  grafana_data: